{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h3 class="mb-4 text-center fw-bold" style="text-shadow: 1px 1px 4px rgba(0,0,0,0.2);">
            Mis Listas de Tareas
        </h3>
        
        <div class="card p-4 shadow-lg mb-4">
            <form method="POST" class="input-group">
                {% csrf_token %}
                <input type="text" name="name" class="form-control border-primary-subtle" placeholder="Ej: Compras del mes, Trabajo..." required>
                <button class="btn btn-primary px-4" type="submit">Crear Lista</button>
            </form>
        </div>

        <div class="list-group shadow-sm">
            {% for list in lists %}
            <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center border-0 mb-2 rounded shadow-sm py-3">
                <a href="{% url 'task_detail' list.id %}" class="text-dark text-decoration-none fw-bold fs-5 d-flex align-items-center">
                    <span class="me-2">📁</span> {{ list.name }}
                </a>
                <button onclick="deleteList('{{ list.id }}')" class="btn btn-sm btn-outline-danger border-0 fw-bold">
                    Eliminar
                </button>
            </div>
            {% empty %}
            <div class="text-center mt-5">
                <div class="display-1 opacity-25">📝</div>
                <p class="text-muted mt-3">Aún no tienes ninguna lista de tareas.<br>¡Crea la primera arriba!</p>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<script>
function deleteList(listId) {
    if (confirm('¿Seguro que deseas eliminar esta lista junto con todas sus tareas?')) {
        fetch(`/lists/${listId}/`, {
            method: 'DELETE',
            headers: {
                'X-CSRFToken': '{{ csrf_token }}'
            }
        }).then(response => {
            if (response.status === 204) {
                window.location.reload();
            } else {
                alert('Ocurrió un error al eliminar la lista.');
            }
        });
    }
}
</script>

<style>
    /* Efecto de elevar la lista al pasar el ratón */
    .list-group-item {
        transition: transform 0.2s ease;
        background-color: white !important;
    }
    .list-group-item:hover {
        transform: scale(1.02);
        z-index: 1;
    }
</style>
{% endblock %}
