{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card p-4 shadow text-center">
            <h3 class="mb-4">Crear Cuenta</h3>
            
            <form method="post">
                {% csrf_token %}
                
                {% for field in form %}
                    <div class="mb-3 text-start">
                        <label class="form-label fw-bold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}

                <button type="submit" class="btn btn-primary w-100 mt-3">Registrarme</button>
            </form>

            <div class="mt-4">
                <p class="text-muted small">¿Ya tienes cuenta? 
                    <a href="{% url 'login' %}" class="text-info text-decoration-none">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>
</div>

<style>
    /* Esto hace que los inputs de Django se vean bonitos con Bootstrap */
    input {
        width: 100%;
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #333;
        background-color: #2b2b2b !important;
        color: white !important;
    }
    ul.errorlist, .helptext { display: none; } /* Oculta los textos de ayuda largos */
</style>
{% endblock %}
