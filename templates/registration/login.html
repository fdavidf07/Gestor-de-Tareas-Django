{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card p-4 shadow">
            <h3 class="text-center mb-4">Iniciar Sesión</h3>
            
            <form method="post">
                {% csrf_token %}
                
                {% if form.errors %}
                    <div class="alert alert-danger">
                        Usuario o contraseña incorrectos.
                    </div>
                {% endif %}

                <div class="mb-3">
                    {{ form.username.label_tag }}
                    <input type="text" name="username" class="form-control bg-dark text-white border-secondary" required>
                </div>
                
                <div class="mb-3">
                    {{ form.password.label_tag }}
                    <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-2">Entrar</button>
            </form>

            <div class="mt-4 text-center">
                <p class="text-muted">¿No tienes cuenta? 
                    <a href="{% url 'register' %}" class="text-info text-decoration-none">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
