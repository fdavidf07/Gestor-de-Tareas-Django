<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Django</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); /* Fondo azul degradado alegre */
            color: #ffffff; 
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }
        
        .navbar {
            background-color: rgba(0, 0, 0, 0.2) !important;
            backdrop-filter: blur(10px); /* Efecto cristal */
        }

        .card { 
            background-color: rgba(255, 255, 255, 0.95); /* Tarjetas blancas semi-transparentes */
            border: none; 
            color: #1e293b; /* Texto oscuro para que se lea genial */
            border-radius: 15px;
        }

        /* Texto de "No tienes listas" ahora se verá muy claro */
        .text-muted { 
            color: #cbd5e1 !important; 
            font-weight: 500;
            font-size: 1.1rem;
        }

        .btn-primary { 
            background-color: #2563eb; 
            border: none; 
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary:hover { 
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        /* Inputs más modernos */
        .form-control {
            border-radius: 10px;
            border: 2px solid #e2e8f0;
        }

        /* Etiquetas de estado */
        .badge { font-weight: 600; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'lists_root' %}">🚀 TaskMaster</a>
            <div>
                {% if user.is_authenticated %}
                    <span class="me-3 small opacity-75">Sesión de: <strong>{{ user.username }}</strong></span>
                    <form action="{% url 'logout' %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-danger px-3 shadow-sm">Cerrar sesión</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-sm btn-light">Entrar</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
